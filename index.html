<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>タガログ語 2ヶ月チャレンジ</title>
<style>
  /* Palette: "Manila" by day (manila-paper warmth + jeepney sunset accent) /
     "Manila Bay" by night (deep teal dusk + glowing sunset neon) */
  :root{
    --bg:#f5efe0; --surface:#fffdf8; --surface2:#ece0c6; --text:#271c14; --text-dim:#7d6a53;
    --accent:#e0602f; --accent2:#1f6f74; --gold:#e8a53a; --good:#2f8f5b; --warn:#b3791c; --bad:#c0392b;
    --border:#e2d3af; --shadow:0 2px 10px rgba(90,60,20,0.10);
    --radius:16px; --accent-ink:#fff8ee;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#12191b; --surface:#192225; --surface2:#20302f; --text:#f1ece0; --text-dim:#9db1ae;
      --accent:#ff7a45; --accent2:#45c8bd; --gold:#ffcf6b; --good:#49d18f; --warn:#ffcf6b; --bad:#ff6b6b;
      --border:#28383a; --shadow:0 2px 16px rgba(0,0,0,0.4); --accent-ink:#1a1006; }
  }
  :root[data-theme="dark"]{ --bg:#12191b; --surface:#192225; --surface2:#20302f; --text:#f1ece0; --text-dim:#9db1ae;
    --accent:#ff7a45; --accent2:#45c8bd; --gold:#ffcf6b; --good:#49d18f; --warn:#ffcf6b; --bad:#ff6b6b;
    --border:#28383a; --shadow:0 2px 16px rgba(0,0,0,0.4); --accent-ink:#1a1006; }
  :root[data-theme="light"]{ --bg:#f5efe0; --surface:#fffdf8; --surface2:#ece0c6; --text:#271c14; --text-dim:#7d6a53;
    --accent:#e0602f; --accent2:#1f6f74; --gold:#e8a53a; --good:#2f8f5b; --warn:#b3791c; --bad:#c0392b;
    --border:#e2d3af; --shadow:0 2px 10px rgba(90,60,20,0.10); --accent-ink:#fff8ee; }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; height:100%; overscroll-behavior-y:contain; }
  body{
    background:var(--bg); color:var(--text);
    font-family:"Hiragino Sans","Noto Sans JP","Segoe UI",system-ui,sans-serif;
    display:flex; justify-content:center;
  }
  #app-root{ width:100%; max-width:560px; min-height:100vh; display:flex; flex-direction:column; position:relative; }
  #view{ flex:1; padding:14px 14px 90px 14px; overflow-y:auto; }

  header.topbar{
    position:sticky; top:0; z-index:5;
    background:linear-gradient(100deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px; box-shadow:var(--shadow);
  }
  .brand{ display:flex; flex-direction:column; color:var(--accent-ink); }
  .brand b{ font-size:15px; letter-spacing:.03em; font-weight:800; text-transform:uppercase; }
  .brand span{ font-size:11px; color:var(--accent-ink); opacity:.85; font-variant-numeric:tabular-nums; }
  .streak-pill{
    display:flex; align-items:center; gap:5px; background:rgba(0,0,0,0.18); color:var(--accent-ink);
    padding:6px 12px; border-radius:20px; font-size:13px; font-weight:800; white-space:nowrap;
    font-variant-numeric:tabular-nums;
  }

  nav.bottomnav{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:560px; display:flex; background:var(--surface);
    border-top:1px solid var(--border); padding:6px 4px calc(6px + env(safe-area-inset-bottom)) 4px;
    z-index:10;
  }
  nav.bottomnav button{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
    background:none; border:none; color:var(--text-dim); font-size:10.5px; padding:6px 2px; border-radius:10px;
    font-family:inherit; cursor:pointer;
  }
  nav.bottomnav button .ic{ font-size:19px; }
  nav.bottomnav button.active{ color:var(--accent); background:var(--surface2); }

  .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:14px; box-shadow:var(--shadow); position:relative; }
  .card h2{ margin:0 0 8px 0; font-size:17px; font-weight:800; letter-spacing:-.01em; text-wrap:balance; }
  .card h3{ margin:0 0 6px 0; font-size:12.5px; color:var(--text-dim); font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
  .muted{ color:var(--text-dim); font-size:12.5px; line-height:1.6; }
  .row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .col{ display:flex; flex-direction:column; gap:10px; }

  .progressbar{ height:8px; border-radius:6px; background:var(--surface2); overflow:hidden; margin:8px 0; }
  .progressbar > div{ height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:6px; transition:width .3s; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--accent); color:#fff; border:none; border-radius:12px;
    padding:12px 16px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit;
    width:100%;
  }
  .btn.secondary{ background:var(--surface2); color:var(--text); }
  .btn.ghost{ background:transparent; color:var(--accent); border:1.5px solid var(--accent); }
  .btn.good{ background:var(--good); }
  .btn.bad{ background:var(--bad); }
  .btn.warn{ background:var(--warn); color:#241a00; }
  .btn:disabled{ opacity:.45; }
  .btn-row{ display:flex; gap:8px; }
  .btn-row .btn{ width:auto; flex:1; }

  .lesson-badge{ display:inline-block; font-size:10.5px; font-weight:800; color:var(--accent-ink); background:var(--accent); padding:4px 10px; border-radius:6px; margin-bottom:8px; text-transform:uppercase; letter-spacing:.06em; }
  .locked{ opacity:.5; }
  .lock-tag{ font-size:11px; color:var(--text-dim); font-variant-numeric:tabular-nums; }

  .flip-card{ perspective:1200px; height:260px; margin-bottom:16px; }
  .flip-inner{ position:relative; width:100%; height:100%; transition:transform .45s; transform-style:preserve-3d; }
  .flip-card.flipped .flip-inner{ transform:rotateY(180deg); }
  .flip-face{
    position:absolute; inset:0; -webkit-backface-visibility:hidden; backface-visibility:hidden;
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    display:flex; align-items:center; justify-content:center; flex-direction:column; padding:22px; text-align:center;
    box-shadow:var(--shadow);
  }
  .flip-face.back{ transform:rotateY(180deg); }
  .flip-face .big{ font-size:26px; font-weight:800; line-height:1.35; letter-spacing:-.01em; text-wrap:balance; }
  .flip-face .small{ font-size:13px; color:var(--text-dim); margin-top:14px; padding-top:14px; border-top:1.5px dashed var(--border); width:80%; }
  .tap-hint{ position:absolute; bottom:14px; font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em; }
  .ticket-tag{
    position:absolute; top:12px; left:12px; background:var(--surface2); color:var(--text-dim);
    font-size:10.5px; font-weight:800; padding:3px 9px; border-radius:6px; letter-spacing:.04em;
  }
  h1.page-title{ font-size:20px; font-weight:800; letter-spacing:-.01em; margin:4px 0 14px 0; text-wrap:balance; }

  .quiz-opt{
    display:block; width:100%; text-align:left; background:var(--surface); border:1.5px solid var(--border);
    border-radius:12px; padding:13px 14px; margin-bottom:9px; font-size:14px; color:var(--text); font-family:inherit; cursor:pointer;
  }
  .quiz-opt.correct{ border-color:var(--good); background:rgba(30,142,90,0.12); }
  .quiz-opt.wrong{ border-color:var(--bad); background:rgba(192,57,43,0.12); }

  .grammar-note{ background:var(--surface2); border-radius:12px; padding:11px 13px; margin-bottom:8px; font-size:13px; line-height:1.7; }
  .vocab-row{ display:flex; justify-content:space-between; gap:10px; padding:9px 2px; border-bottom:1px solid var(--border); font-size:13.5px; }
  .vocab-row:last-child{ border-bottom:none; }
  .vocab-tl{ font-weight:700; }
  .vocab-en{ color:var(--text-dim); text-align:right; }
  .sentence-row{ padding:10px 2px; border-bottom:1px solid var(--border); font-size:13.5px; }
  .sentence-row:last-child{ border-bottom:none; }
  .sentence-tl{ font-weight:700; margin-bottom:2px; }
  .sentence-en{ color:var(--text-dim); font-size:12.5px; }

  .empty-state{ text-align:center; padding:40px 10px; color:var(--text-dim); }
  .empty-state .emoji{ font-size:40px; margin-bottom:10px; }

  .stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat-box{ background:var(--surface2); border-radius:14px; padding:12px; text-align:center; }
  .stat-box b{ display:block; font-size:20px; font-variant-numeric:tabular-nums; }
  .stat-box span{ font-size:11px; color:var(--text-dim); }

  .modal-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal-box{ background:var(--surface); border-radius:20px; padding:22px; max-width:420px; width:100%; box-shadow:var(--shadow); max-height:85vh; overflow-y:auto; }
</style>
</head>
<body>
<div id="app-root">
  <header class="topbar">
    <div class="brand"><b>タガログ語 2ヶ月チャレンジ</b><span id="daylabel">Day 1 / 60</span></div>
    <div class="streak-pill">🔥 <span id="streakcount">0</span></div>
  </header>
  <div id="view"></div>
  <nav class="bottomnav">
    <button data-view="home"><span class="ic">🏠</span>ホーム</button>
    <button data-view="cards"><span class="ic">🗂️</span>単語</button>
    <button data-view="quiz"><span class="ic">✏️</span>文法</button>
    <button data-view="talk"><span class="ic">💬</span>会話</button>
    <button data-view="lessons"><span class="ic">📚</span>レッスン</button>
  </nav>
</div>
<script>
// Extracted lesson data batch: Lessons 1-5
// v = vocab [tagalog, english], g = grammar notes (string array), s = example sentences [tagalog, english]
const LESSONS_1_5 = [
{
  id:1, title:"Greetings and Self-Introduction",
  v:[
    ["Kumusta?","How are you?"],
    ["Magandang umaga","Good morning"],
    ["Magandang hapon","Good afternoon"],
    ["Magandang gabi","Good evening"],
    ["Paalam","Goodbye"],
    ["Salamat","Thank you"],
    ["Ako si [Name].","I am [Name]."],
    ["Taga-[Place] ako.","I am from [Place]."],
    ["Ikaw?","And you?"],
    ["Oo / Hindi","Yes / No"]
  ],
  g:[
    "\"Maganda\" means beautiful, so greetings like Magandang umaga literally mean 'beautiful morning'.",
    "Add 'po' to be more polite/respectful: Kumusta po?, Salamat po.",
    "Vowels: a=father, e=bet, i=machine, o=go, u=moon.",
    "Japanese speakers often turn Tagalog 'L' into 'R' (Salamat -> Saramat) since Japanese lacks a distinct L sound."
  ],
  s:[
    ["Kumusta po kayo?","How are you, sir/madam? (formal)"],
    ["Ako si Maria. Taga-Osaka ako.","I am Maria. I am from Osaka."],
    ["Magandang umaga po!","Good morning, sir/madam!"]
  ]
},
{
  id:2, title:"Polite Forms & Common Expressions",
  v:[
    ["Mabuti po.","Fine/good, sir/madam."],
    ["Mabuti naman po / Mabuti rin po","Fine, too, sir/madam."],
    ["Opo","Yes (formal/polite)"],
    ["Paumanhin po","Excuse me / sorry (apologize, bumped into someone)"],
    ["Pakiraan po","Excuse me (asking to pass through)"],
    ["Mawalang-galang po","Excuse me (asking to be heard)"],
    ["Patawad po","I'm sorry (for causing hurt/injury)"],
    ["Pasintabi po","Pardon (warning something may offend)"],
    ["Hindi ko alam. (Di ko alam.)","I don't know."],
    ["Ayaw ako. (Ayoko.)","I don't like."],
    ["Bahala na!","Come what may!"],
    ["Konti lang","Just a little."],
    ["Minsan.","Once in a while."],
    ["Gising na!","Wake up!"],
    ["Hindi bale!","Never mind!"],
    ["Teka! (Hintay ka!)","Wait a moment!"],
    ["Dali ka! (Magmadali ka!)","Hurry up!"],
    ["Maraming salamat.","Thank you very much."],
    ["Ano po?","What did you say, sir/madam?"],
    ["Saka na.","Later."],
    ["Sandali lang.","Just a moment."],
    ["Sayang!","What a pity!"],
    ["Tama na.","That's enough / all right."],
    ["Tara na. (Tayo na.)","Let's go."],

    ["Marahil / Siguro.","Maybe."]
  ],
  g:[
    "'Po' shows respect to elders, authority figures, or strangers; not used by an older person to a younger one.",
    "Greetings from morning to evening: Magandang araw/umaga/tanghali/hapon/gabi po.",
    "Kumusta ka? (casual) vs Kumusta po kayo? (formal), derived from Spanish 'Cómo está'."
  ],
  s:[
    ["Kumusta po kayo? - Mabuti po.","How are you sir? - Fine, sir."],
    ["Paumanhin po.","Excuse me/sorry (bumped into someone)."],
    ["Sandali lang po.","Just a moment, sir/madam."]
  ]
},
{
  id:3, title:"Articles Si/Sina, Ang/Ang Mga, Sentence Order",
  v:[
    ["marunong","intelligent"],
    ["bata","young / child"],
    ["lungsod","city"],
    ["magkapatid","siblings"],
    ["malinis","clean"],
    ["sapatos","shoes"],
    ["lugar","place"],
    ["mahal","expensive"],
    ["bahay","house"],
    ["aso","dog"],
    ["kumakain","is/are eating"],
    ["mainit","hot"],
    ["pusa","cat"],
    ["naglulto","is/are cooking"]
  ],
  g:[
    "Si = singular article before a person's name (Si Ruth ay babae). Sina = plural, before two+ persons' names (Sina Helen at Tom ay mababait).",
    "Ang = article before a single thing/place (Ang bata ay mabait). Ang mga (\"ma-nga\") = plural things/places (Ang mga bata ay mababait).",
    "Subject-predicate order: Subject + ay + predicate (Ang bahay ay malaki - The house is big). Emphasis on subject.",
    "Inverted order: Predicate + subject, no 'ay' used (Malaki ang bahay). Emphasis on predicate. This is more common in everyday speech. For plural subjects use 'mga' not 'ang mga' in inverted order."
  ],
  s:[
    ["Si Ruth ay maganda.","Ruth is pretty."],
    ["Sina Helen at Tom ay mababait.","Helen and Tom are good."],
    ["Ang mga sapatos ay malilinis.","The shoes are clean."],
    ["Malaki ang bahay.","The house is big. (inverted)"],
    ["Mabait si Peter.","Peter is good. (inverted)"]
  ]
},
{
  id:4, title:"Personal Pronouns & Demonstratives (ito/iyan/iyon)",
  v:[
    ["ako","I"],
    ["kami","we (excludes listener)"],
    ["tayo","we (includes listener)"],
    ["ikaw / ka","you (singular)"],
    ["kayo","you (plural/polite)"],
    ["siya","he/she"],
    ["sila","they"],
    ["ito","this (near speaker)"],
    ["iyan","that (near listener)"],
    ["iyon","that (far from both)"]
  ],
  g:[
    "Akó=I; linked with 'ay' at sentence start, shortened to 'y after vowels (Ako'y...).",
    "Kami = we excluding listener; Tayo = we including listener.",
    "Ikaw used at sentence start; shortened to 'ka' in inverted order.",
    "Siya=he/she (singular); Sila=they (plural).",
    "Ito(this, near speaker), Iyan(that, near listener), Iyon(that, far from both) - all linked with ay, dropped in inverted order.",
    "Plural demonstratives use ang mga: Ang mga ito ay mababait.",
    "Ito/iyan/iyon can modify a noun as 'this/that X': Ang mesang ito ay malinis (This table is clean)."
  ],
  s:[
    ["Ako ay si John.","I am John."],
    ["Kami'y magkapatid.","We are siblings (excl.)."],
    ["Tayo ay sina John at Mary.","We are John and Mary (incl.)."],
    ["Ito'y si John.","This is John."],
    ["Malaki iyon.","That is big (far)."]
  ]
},
{
  id:5, title:"Ligatures -ng, -g, na (Linking Words)",
  v:[
    ["mapagbigay","generous"],
    ["hangal","fool"],
    ["pagod","tired"],
    ["inapi","maltreated"],
    ["sariwa","fresh"],
    ["maasim","sour"],
    ["tahimik","quiet"],
    ["malinaw","clear"],
    ["matapang","brave"],
    ["bundok","mountain"],
    ["binata","bachelor"],
    ["dalaga","unmarried woman"],
    ["masipag","industrious"],
    ["mabilis","fast"],
    ["marumi","dirty"],
    ["madilim","dark"],
    ["mayaman","rich"],
    ["payat","thin"],
    ["mataba","fat"],
    ["maitim","black"],
    ["maputi","whitish"],
    ["maingay","noisy"],
    ["tamad","lazy"],
    ["matamis","sweet"]
  ],
  g:[
    "Ligatures link two adjacent words with no meaning of their own, showing one modifies the other.",
    "-ng suffix attaches to words ending in vowels: malaki+ng+bahay = malaking bahay (big house).",
    "-g suffix attaches to words ending in consonant 'n': mayaman+g+lalaki = mayamang lalaki (rich man).",
    "na is used after words ending in consonants other than n: maasim + na + mangga = maasim na mangga (sour mango).",
    "Applies to noun+noun, noun+verb, adjective+verb, verb+adverb, adjective+adjective(repeated for superlative, e.g. malinaw na malinaw = very clear), noun+possessive pronoun (exception: aklat ko, bahay namin)."
  ],
  s:[
    ["Ang malaking bahay ay isang paaralan.","The big house is a school."],
    ["Ang mayamang lalaki ay mapagbigay.","The rich man is generous."],
    ["Kumain siya ng maasim na mangga.","He/she ate a sour mango."],
    ["Magandang ang tahimik na bata.","The quiet child is beautiful."],
    ["Malinaw na malinaw ang utos niya.","His/her command is very clear."]
  ]
}
];

const LESSONS_6_10 = [
{
  id:6, title:"Possessives: ni/ng, akin/iyo/kaniya, nito/niyan/niyon",
  v:[
    ["damit","clothes"],["kotse","car"],["gamot","medicine"],["pagkain","food"],
    ["luma","old"],["paaralan","school"],["malamig","cold"],["madumi","dirty"],

    ["nito","of this (person)"],["niyan","of that (near listener)"],["niyon","of that (far)"]
  ],
  g:[
    "Ni = possessive word before a proper noun (name): ang bahay ni Maria = Maria's house. Object possessed comes before owner.",
    "Ng = possessive word before a common noun: ang lapis ng guro = the teacher's pencil.",
    "Plural: nina (for names, e.g. nina Maria at Pedro), ng mga (for common nouns, e.g. ng mga lalaki).",
    "Possessive pronouns table: akin/ko(my), iyo/mo(your), kaniya-kanya/niya(his-her), amin/namin(our excl.), atin/natin(our incl.), inyo/ninyo(your pl.), kanila/nila(their). Long form (akin, iyo...) goes BEFORE the noun with a ligature; short form (ko, mo, niya...) goes AFTER the noun.",

    "Nito/niyan/niyon (possessive forms of ito/iyan/iyon) always stay AFTER the noun, even in inverted sentences: Ang bahay nito ay malaki / Malaki ang bahay nito."

    ["Malínis ang sapátos niyá.","His/her shoes are clean."],

    ["Ang kanilang kotse ay bago.","Their car is new."]

},
{

    ["kanino","whose / to-for whom"],
    ["malaman","to know"],["gusto","to like/want"],["nakatira","live/reside"],
    ["simbahan","church"],["galit","angry"],["dumating","arrived"],["tao","person"],["pelikula","movie"]
  ],
  g:[
    "14 question words in Tagalog correspond to who/what/which/how/why/when/where/whose.",
    "Plural question words are formed by duplication: 2-syllable words duplicate fully (sino->sinu-sino, alin->alin-alin); 3+ syllable words duplicate only first two syllables (kanino->kani-kanino, magkano->magka-magkano); final 'o' becomes 'u' in the duplicated part (ano->anu-ano).",

    "Kanino requires a possessive-pronoun answer (akin, kaniya, kanila...).",
    "Ito/iyan can shorten to 'to/'yan in casual questions: Sino 'yan? (Who's that?), Kanino 'to? (Whose is this?)",

const LESSON_ORDER = ALL_LESSONS.map(function(l){ return l.id; });
const VOCAB_CARDS = [];
const SENT_CARDS = [];
ALL_LESSONS.forEach(function(lesson){
  (lesson.v||[]).forEach(function(pair, idx){
    VOCAB_CARDS.push({ id:'v'+lesson.id+'_'+idx, lessonId:lesson.id, tl:pair[0], en:pair[1] });
  });
  (lesson.s||[]).forEach(function(pair, idx){

const TOTAL_DAYS = 60;
/* Daily new-card cap, raised 5x on request (was vocab:9, sent:5) so lessons
   unlock much faster - at this rate a daily learner gets through all content
   in well under 60 days instead of the full 2 months. */
const NEW_CAP = { vocab: 45, sent: 25 };
/* Session cap kept comfortably above NEW_CAP so a single sitting can always
   show every newly-introduced card, not just a truncated slice of them. */
const SESSION_CAP = { vocab: 60, sent: 30 };
const QUIZ_LEN = 10;

function lessonById(id){ return ALL_LESSONS.filter(function(l){ return l.id===id; })[0]; }
function lessonIdx(id){ return LESSON_ORDER.indexOf(id); }
/* targetDay: a recommended-pace label only (shown in the Lessons list), not a hard gate.
   Spread linearly across the full TOTAL_DAYS (60) so lesson 1 -> day 1 and the last
   lesson -> day 60 - a genuine 2-month pace, not one that finishes with weeks to spare. */
function targetDay(id){
  const idx = lessonIdx(id);
  const lastIdx = LESSON_ORDER.length - 1;
  return Math.round(idx * (TOTAL_DAYS-1) / lastIdx) + 1;
}
/* isUnlocked: progress-based. Lesson k unlocks once every vocab card of lessons 0..k-1
   has been introduced into the flashcard deck at least once (so eager study, not the
   calendar, is what advances you - the old version blocked lesson 2+ until a real day passed). */
function isUnlocked(id){
  const idx = lessonIdx(id);
  for(let i=0;i<idx;i++){
    const prevVocab = VOCAB_CARDS.filter(function(c){ return c.lessonId===LESSON_ORDER[i]; });
    const allIntroduced = prevVocab.every(function(c){ return !!state.cardState[c.id]; });
    if(!allIntroduced) return false;
  }
  return true;
}

/* ================= Date / utils ================= */
function pad(n){ return n<10 ? '0'+n : ''+n; }
function toDateStr(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function todayStr(){ return toDateStr(new Date()); }
function addDays(str, n){ const d=new Date(str+'T00:00:00'); d.setDate(d.getDate()+n); return toDateStr(d); }
function currentDay(){
  const start = new Date(state.startDate+'T00:00:00');
  const now = new Date(todayStr()+'T00:00:00');
  const diff = Math.round((now-start)/86400000);
  return Math.min(TOTAL_DAYS+30, Math.max(1, diff+1));
}
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function sampleN(arr, n){ return shuffle(arr).slice(0, n); }
function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* ================= State ================= */
const STORAGE_KEY = 'tglChallenge_v1';
let state = null;
function loadState(){
  let raw = null;
  try{ raw = localStorage.getItem(STORAGE_KEY); }catch(e){}
  if(raw){
    try{ state = JSON.parse(raw); }catch(e){ state = null; }
  }
  if(!state){
    state = {
      startDate: todayStr(),
      cardState: {},
      newIntroducedByDate: { vocab:{}, sent:{} },
      streak: { last:null, count:0 },
      stats: { totalReviews:0 },
      firstRun: true
    };
    saveState();
  }
  if(!state.newIntroducedByDate) state.newIntroducedByDate = { vocab:{}, sent:{} };
  if(!state.stats) state.stats = { totalReviews:0 };
  if(!state.streak) state.streak = { last:null, count:0 };
}
function saveState(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} }

function countIntroducedToday(pool){
  const d = state.newIntroducedByDate[pool] || {};
  return d[todayStr()] || 0;
}
function bumpNewCount(pool){
  const d = state.newIntroducedByDate[pool] = state.newIntroducedByDate[pool] || {};
  d[todayStr()] = (d[todayStr()]||0) + 1;
}
function touchStreak(){
  const t = todayStr();
  if(state.streak.last === t) return;
  const y = addDays(t, -1);
  if(state.streak.last === y){ state.streak.count += 1; }
  else { state.streak.count = 1; }
  state.streak.last = t;
  saveState();
}

/* ================= SRS ================= */
function gradeCard(cardId, grade){
  const st = state.cardState[cardId];
  if(!st) return;
  if(grade==='again'){
    st.reps = 0; st.interval = 0; st.ef = Math.max(1.3, (st.ef||2.5)-0.2); st.due = todayStr();
  } else if(grade==='good'){
    st.reps = (st.reps||0) + 1;
    st.interval = st.reps===1 ? 1 : st.reps===2 ? 3 : Math.round((st.interval||1)*(st.ef||2.5));
    st.due = addDays(todayStr(), st.interval);
  } else {
    st.ef = (st.ef||2.5) + 0.15;
    st.reps = (st.reps||0) + 1;
    st.interval = st.reps===1 ? 3 : st.reps===2 ? 6 : Math.round((st.interval||1)*st.ef*1.3);
    st.due = addDays(todayStr(), st.interval);
  }
  st.lastReview = todayStr();
  state.stats.totalReviews = (state.stats.totalReviews||0) + 1;
  touchStreak();
  saveState();
}

function buildSessionQueue(poolCards, poolName, newCap, sessionCap){
  const unlockedIds = {};
  LESSON_ORDER.forEach(function(id){ if(isUnlocked(id)) unlockedIds[id]=true; });
  const available = poolCards.filter(function(c){ return unlockedIds[c.lessonId]; });
  const today = todayStr();
  const due = [], fresh = [];
  available.forEach(function(c){
    const st = state.cardState[c.id];
    if(st){ if(st.due <= today) due.push(c); }
    else { fresh.push(c); }
  });
  due.sort(function(a,b){ return state.cardState[a.id].due.localeCompare(state.cardState[b.id].due); });
  const already = countIntroducedToday(poolName);
  const allowance = Math.max(0, newCap - already);
  const freshToUse = fresh.slice(0, allowance);
  freshToUse.forEach(function(c){
    state.cardState[c.id] = { ef:2.5, interval:0, reps:0, due: today, introducedOn: today };
    bumpNewCount(poolName);
  });
  if(freshToUse.length) saveState();
  let queue = due.concat(freshToUse);
  if(sessionCap) queue = queue.slice(0, sessionCap);
  return queue;
}

function countDue(poolCards, poolName){
  const unlockedIds = {};
  LESSON_ORDER.forEach(function(id){ if(isUnlocked(id)) unlockedIds[id]=true; });
  const today = todayStr();
  let due=0, fresh=0;
  poolCards.forEach(function(c){
    if(!unlockedIds[c.lessonId]) return;
    const st = state.cardState[c.id];
    if(st){ if(st.due<=today) due++; } else { fresh++; }
  });
  const allowance = Math.max(0, NEW_CAP[poolName] - countIntroducedToday(poolName));
  return due + Math.min(fresh, allowance);
}

function introducedCount(poolCards){
  return poolCards.filter(function(c){ return !!state.cardState[c.id]; }).length;
}
function masteredCount(poolCards){
  return poolCards.filter(function(c){ const st=state.cardState[c.id]; return st && st.reps>=3 && st.interval>=16; }).length;
}

/* ================= Quiz generation ================= */
function buildQuizQuestions(n){
  const unlockedIds = {};
  LESSON_ORDER.forEach(function(id){ if(isUnlocked(id)) unlockedIds[id]=true; });
  const vocabPool = VOCAB_CARDS.filter(function(c){ return unlockedIds[c.lessonId]; });
  const sentPool = SENT_CARDS.filter(function(c){ return unlockedIds[c.lessonId]; });
  const qs = [];
  let attempts = 0;
  while(qs.length < n && attempts < n*10){
    attempts++;
    const useVocab = Math.random() < 0.6 && vocabPool.length >= 4;
    if(useVocab){
      const correct = rand(vocabPool);
      const distractorPool = vocabPool.filter(function(c){ return c.id!==correct.id && c.en!==correct.en; });
      if(distractorPool.length < 3) continue;
      const distractors = sampleN(distractorPool, 3);
      const dirEnToTl = Math.random() < 0.5;
      const opts = shuffle([correct].concat(distractors));
      qs.push({
        kind:'vocab',
        prompt: dirEnToTl ? correct.en : correct.tl,
        promptLabel: dirEnToTl ? 'この意味のタガログ語は？' : 'この単語の意味は？',
        options: opts.map(function(o){ return dirEnToTl ? o.tl : o.en; }),
        answer: dirEnToTl ? correct.tl : correct.en
      });
    } else {
      if(sentPool.length < 4) continue;
      const correct = rand(sentPool);
      const distractorPool = sentPool.filter(function(c){ return c.id!==correct.id && c.en!==correct.en; });
      if(distractorPool.length < 3) continue;
      const distractors = sampleN(distractorPool, 3);
      const opts = shuffle([correct].concat(distractors));
      qs.push({
        kind:'sentence',
        prompt: correct.tl,
        promptLabel: 'この文の意味は？',
        options: opts.map(function(o){ return o.en; }),
        answer: correct.en
      });
    }
  }
  return qs;
}

/* ================= Global UI state ================= */
let currentTab = 'home';
let session = null;
let lessonDetailId = null;

function setTab(t){ currentTab = t; session = null; lessonDetailId = null; render(); window.scrollTo(0,0); }

/* ================= Render root ================= */
function render(){
  document.querySelectorAll('nav.bottomnav button').forEach(function(b){
    b.classList.toggle('active', b.dataset.view === currentTab);
  });
  document.getElementById('daylabel').textContent = 'Day ' + Math.min(currentDay(), TOTAL_DAYS) + ' / ' + TOTAL_DAYS;
  document.getElementById('streakcount').textContent = state.streak.count || 0;
  const view = document.getElementById('view');
  let html = '';
  if(session && session.type==='cards') html = renderCardSession();
  else if(session && session.type==='quiz') html = renderQuizSession();
  else if(session && session.type==='talk') html = renderTalkSession();
  else if(lessonDetailId !== null) html = renderLessonDetail(lessonDetailId);
  else if(currentTab==='home') html = renderHome();
  else if(currentTab==='cards') html = renderCardsHome();
  else if(currentTab==='quiz') html = renderQuizHome();
  else if(currentTab==='talk') html = renderTalkHome();
  else if(currentTab==='lessons') html = renderLessonsList();
  view.innerHTML = html;
}

/* ================= Home ================= */

/* ================= Quiz ================= */
function renderQuizHome(){

  html += '<button class="btn" data-action="startQuiz">クイズを始める ('+QUIZ_LEN+'問)</button></div>';
  return html;
}
function startQuizSession(){
  const qs = buildQuizQuestions(QUIZ_LEN);
  session = { type:'quiz', queue:qs, idx:0, score:0, answered:false, picked:null };
  render();
}
function renderQuizSession(){
  if(!session.queue.length){
    return '<div class="card"><div class="empty-state">まだ十分な単語がありません。フラッシュカードを進めてから挑戦してください。</div>'
      + '<button class="btn" data-action="goTab" data-id="home">ホームへ戻る</button></div>';
  }
  if(session.idx >= session.queue.length){
    const pct = Math.round((session.score/session.queue.length)*100);
    return '<div class="card"><div class="empty-state"><div class="emoji">'+(pct>=70?'🏆':'📝')+'</div>'
      + 'スコア: '+session.score+' / '+session.queue.length+' ('+pct+'%)</div>'
      + '<button class="btn" data-action="startQuiz">もう一度挑戦</button>'
      + '<div style="height:8px;"></div>'
      + '<button class="btn secondary" data-action="goTab" data-id="home">ホームへ戻る</button></div>';
  }
  const q = session.queue[session.idx];
  let html = '<div class="row" style="margin-bottom:8px;"><span class="muted">'+(session.idx+1)+' / '+session.queue.length+'</span><span class="muted">スコア '+session.score+'</span></div>';
  html += '<div class="card"><h3>'+q.promptLabel+'</h3><h2>'+escapeHtml(q.prompt)+'</h2></div>';
  q.options.forEach(function(opt, i){
    let cls = 'quiz-opt';
    if(session.answered){
      if(opt === q.answer) cls += ' correct';
      else if(i === session.picked) cls += ' wrong';
    }
    html += '<button class="'+cls+'" data-action="answerQuiz" data-id="'+i+'" '+(session.answered?'disabled':'')+'>'+escapeHtml(opt)+'</button>';
  });
  if(session.answered){
    html += '<button class="btn" data-action="nextQuiz">次へ →</button>';
  }
  return html;
}

/* ================= Event delegation ================= */
document.getElementById('view').addEventListener('click', function(e){
  const t = e.target.closest('[data-action]');
  if(!t) return;
  e.preventDefault();
  const action = t.dataset.action;
  const id = t.dataset.id;
  if(action==='goTab'){ setTab(id); }
  else if(action==='openLesson'){ lessonDetailId = Number(id); session=null; render(); window.scrollTo(0,0); }
  else if(action==='closeLesson'){ lessonDetailId = null; render(); }
  else if(action==='startCards'){ startCardSession(); }
  else if(action==='flipCard'){ session.flipped = !session.flipped; render(); }
  else if(action==='gradeCards'){
    const c = session.queue[session.idx];
    gradeCard(c.id, id);
    session.idx += 1; session.flipped = false; render();
  }
  else if(action==='startQuiz'){ startQuizSession(); }
  else if(action==='answerQuiz'){
    const q = session.queue[session.idx];
    session.picked = Number(id);
    session.answered = true;
    if(q.options[session.picked] === q.answer) session.score += 1;
    touchStreak(); saveState();
    render();
  }
  else if(action==='nextQuiz'){ session.idx += 1; session.answered=false; session.picked=null; render(); }
  else if(action==='startTalk'){ startTalkSession(); }
  else if(action==='flipTalk'){ session.flipped = !session.flipped; render(); }
  else if(action==='gradeTalk'){
    const c = session.queue[session.idx];
    gradeCard(c.id, id);
    session.idx += 1; session.flipped = false; render();
  }
  else if(action==='resetProgress'){
    if(confirm('すべての学習進捗をリセットします。よろしいですか？')){
      localStorage.removeItem(STORAGE_KEY);
      loadState();
      setTab('home');
    }
  }
});
document.querySelectorAll('nav.bottomnav button').forEach(function(btn){
  btn.addEventListener('click', function(){ setTab(btn.dataset.view); });
});
